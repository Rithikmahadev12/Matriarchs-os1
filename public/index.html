<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>Matriarchs OS</title>
    <link rel="shortcut icon" content="favicon.webp" />

    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="index.css" />
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="index.js" defer></script>
  </head>
  <body>

    <!-- ═══════════════ BOOT SCREEN ═══════════════ -->
    <div id="boot-screen">
      <div class="boot-logo">
        <div class="boot-sigil">⬡</div>
        <h1 class="boot-title">MATRIARCHS<span>OS</span></h1>
        <div class="boot-version">v1.0.0 — SOVEREIGN EDITION</div>
      </div>
      <div class="boot-log" id="boot-log"></div>
      <div class="boot-bar-wrap">
        <div class="boot-bar" id="boot-bar"></div>
      </div>
    </div>

    <!-- ═══════════════ DESKTOP ═══════════════ -->
    <div id="desktop" class="hidden">

      <!-- TOP BAR -->
      <div id="topbar">
        <div class="topbar-left">
          <span class="os-name">⬡ MATRIARCHS OS</span>
        </div>
        <div class="topbar-right">
          <span id="clock"></span>
        </div>
      </div>

      <!-- DESKTOP ICONS -->
      <div id="desktop-icons">
        <div class="desktop-icon" onclick="openBrowser()">
          <div class="icon-img">🌐</div>
          <span>Browser</span>
        </div>
        <div class="desktop-icon" onclick="openAbout()">
          <div class="icon-img">⬡</div>
          <span>About</span>
        </div>
      </div>

      <!-- WINDOWS LAYER -->
      <div id="windows"></div>

      <!-- DOCK -->
      <div id="dock">
        <div class="dock-item" onclick="openBrowser()" title="Browser">🌐</div>
        <div class="dock-item" onclick="openAbout()" title="About">⬡</div>
      </div>

    </div>

    <!-- BROWSER WINDOW TEMPLATE -->
    <template id="browser-window-tpl">
      <div class="window" id="win-browser">
        <div class="window-titlebar">
          <div class="window-controls">
            <button class="wbtn close" onclick="closeWindow('win-browser')"></button>
            <button class="wbtn min"   onclick="minimizeWindow('win-browser')"></button>
            <button class="wbtn max"   onclick="maximizeWindow('win-browser')"></button>
          </div>
          <span class="window-title">Browser</span>
        </div>
        <div class="window-body">
          <div class="browser-bar">
            <input id="sj-search-engine" value="https://www.google.com/search?q=%s" type="hidden" />
            <input id="sj-address" type="text" placeholder="Search or enter URL…" autocomplete="off" />
            <button id="sj-go">GO</button>
          </div>
          <div id="sj-error-wrap">
            <p id="sj-error"></p>
            <pre id="sj-error-code"></pre>
          </div>
          <div id="sj-frame-wrap"></div>
        </div>
      </div>
    </template>

  </body>
</html>
