<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>Matriarchs OS</title>
    <link rel="shortcut icon" content="favicon.webp" />

    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="index.css" />
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="index.js" defer></script>
  </head>
  <body>

    <!-- SVG ICON DEFS (reusable symbols) -->
    <svg width="0" height="0" style="position:absolute;overflow:hidden">
      <defs>
        <!-- Hexagon sigil -->
        <symbol id="ico-hex" viewBox="0 0 24 24">
          <path d="M12 2L21.66 7.5V16.5L12 22L2.34 16.5V7.5Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M12 6L18.5 9.75V17.25L12 21L5.5 17.25V9.75Z" fill="none" stroke="currentColor" stroke-width="0.75" opacity="0.45"/>
          <circle cx="12" cy="12" r="2.5" fill="currentColor"/>
        </symbol>
        <!-- Globe / Browser -->
        <symbol id="ico-globe" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <path d="M3 12h18M12 3C9.5 6 8 9 8 12s1.5 6 4 9M12 3c2.5 3 4 6 4 9s-1.5 6-4 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </symbol>
        <!-- Terminal -->
        <symbol id="ico-term" viewBox="0 0 24 24">
          <rect x="2" y="4" width="20" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <path d="M7 9l3 3-3 3M13 15h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </symbol>
        <!-- Files -->
        <symbol id="ico-files" viewBox="0 0 24 24">
          <path d="M5 4h9l5 5v11a1 1 0 01-1 1H5a1 1 0 01-1-1V5a1 1 0 011-1z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M14 4v5h5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M9 13h6M9 16h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </symbol>
        <!-- Settings / Cog -->
        <symbol id="ico-cog" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" fill="none" stroke="currentColor" stroke-width="1.5"/>
        </symbol>
        <!-- Back arrow -->
        <symbol id="ico-back" viewBox="0 0 16 16">
          <path d="M10 3L5 8l5 5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </symbol>
        <!-- Forward arrow -->
        <symbol id="ico-fwd" viewBox="0 0 16 16">
          <path d="M6 3l5 5-5 5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </symbol>
        <!-- Refresh -->
        <symbol id="ico-reload" viewBox="0 0 16 16">
          <path d="M13 8A5 5 0 113 8" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M13 4v4h-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </symbol>
      </defs>
    </svg>

    <!-- ═══════════════ BOOT SCREEN ═══════════════ -->
    <div id="boot-screen">
      <div class="boot-sigil">
        <svg width="56" height="56" viewBox="0 0 24 24">
          <use href="#ico-hex"/>
        </svg>
      </div>
      <h1 class="boot-title">MATRIARCHS <span>OS</span></h1>
      <div class="boot-version">v1.0.0 — SOVEREIGN EDITION</div>
      <div class="boot-log" id="boot-log"></div>
      <div class="boot-bar-wrap">
        <div class="boot-bar" id="boot-bar"></div>
      </div>
    </div>

    <!-- ═══════════════ DESKTOP ═══════════════ -->
    <div id="desktop" class="hidden">

      <!-- TOP BAR -->
      <div id="topbar">
        <div class="topbar-left">
          <div class="bar-logo">
            <svg width="14" height="14" viewBox="0 0 24 24" class="bar-logo-icon">
              <use href="#ico-hex"/>
            </svg>
            <span class="os-name">MATRIARCHS</span>
          </div>
          <div class="bar-sep"></div>
          <span class="bar-menu" onclick="openBrowser()">Browser</span>
          <span class="bar-menu" onclick="openAbout()">About</span>
          <span class="bar-menu">Help</span>
        </div>
        <div class="topbar-right">
          <span id="clock"></span>
        </div>
      </div>

      <!-- DESKTOP ICONS -->
      <div id="desktop-icons">
        <div class="desktop-icon" onclick="openBrowser()">
          <div class="icon-img">
            <svg width="32" height="32" viewBox="0 0 24 24"><use href="#ico-globe"/></svg>
          </div>
          <span>Browser</span>
        </div>
        <div class="desktop-icon" onclick="openAbout()">
          <div class="icon-img">
            <svg width="32" height="32" viewBox="0 0 24 24"><use href="#ico-hex"/></svg>
          </div>
          <span>About</span>
        </div>
        <div class="desktop-icon">
          <div class="icon-img">
            <svg width="32" height="32" viewBox="0 0 24 24"><use href="#ico-files"/></svg>
          </div>
          <span>Files</span>
        </div>
        <div class="desktop-icon">
          <div class="icon-img">
            <svg width="32" height="32" viewBox="0 0 24 24"><use href="#ico-term"/></svg>
          </div>
          <span>Terminal</span>
        </div>
      </div>

      <!-- WINDOWS LAYER -->
      <div id="windows"></div>

      <!-- DOCK -->
      <div id="dock">
        <div class="dock-item" onclick="openBrowser()">
          <svg width="22" height="22" viewBox="0 0 24 24"><use href="#ico-globe"/></svg>
          <span class="dock-tooltip">Browser</span>
        </div>
        <div class="dock-item" onclick="openAbout()">
          <svg width="22" height="22" viewBox="0 0 24 24"><use href="#ico-hex"/></svg>
          <span class="dock-tooltip">About</span>
        </div>
        <div class="dock-item">
          <svg width="22" height="22" viewBox="0 0 24 24"><use href="#ico-files"/></svg>
          <span class="dock-tooltip">Files</span>
        </div>
        <div class="dock-item">
          <svg width="22" height="22" viewBox="0 0 24 24"><use href="#ico-term"/></svg>
          <span class="dock-tooltip">Terminal</span>
        </div>
        <div class="dock-sep"></div>
        <div class="dock-item">
          <svg width="22" height="22" viewBox="0 0 24 24"><use href="#ico-cog"/></svg>
          <span class="dock-tooltip">Settings</span>
        </div>
      </div>

    </div>

    <!-- BROWSER WINDOW TEMPLATE -->
    <template id="browser-window-tpl">
      <div class="window" id="win-browser">
        <div class="window-titlebar">
          <div class="window-controls">
            <button class="wbtn close" onclick="closeWindow('win-browser')"></button>
            <button class="wbtn min"   onclick="minimizeWindow('win-browser')"></button>
            <button class="wbtn max"   onclick="maximizeWindow('win-browser')"></button>
          </div>
          <span class="window-title">Browser</span>
        </div>
        <div class="window-body">
          <div class="browser-bar">
            <button class="nav-btn" id="sj-back">
              <svg width="16" height="16" viewBox="0 0 16 16"><use href="#ico-back"/></svg>
            </button>
            <button class="nav-btn" id="sj-fwd">
              <svg width="16" height="16" viewBox="0 0 16 16"><use href="#ico-fwd"/></svg>
            </button>
            <button class="nav-btn" id="sj-reload">
              <svg width="16" height="16" viewBox="0 0 16 16"><use href="#ico-reload"/></svg>
            </button>
            <input id="sj-search-engine" value="https://www.google.com/search?q=%s" type="hidden" />
            <input id="sj-address" type="text" placeholder="Search or enter URL…" autocomplete="off" spellcheck="false" />
            <button id="sj-go">GO</button>
          </div>
          <div id="sj-error-wrap">
            <p id="sj-error"></p>
            <pre id="sj-error-code"></pre>
          </div>
          <div id="sj-frame-wrap"></div>
        </div>
      </div>
    </template>

  </body>
</html>
